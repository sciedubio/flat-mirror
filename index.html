                                </div>
                                <div className="glass-panel p-2 rounded-xl text-center flex flex-col justify-center">
                                    <div className="text-[10px] text-slate-400 mb-1">만화경</div><div className={`text-xs font-bold ${hasExploredMulti ? 'text-pink-400' : 'text-slate-500'}`}>{hasExploredMulti ? '체험' : '미완료'}</div>
                                </div>
                                <div className="glass-panel p-2 rounded-xl text-center flex flex-col justify-center bg-emerald-900/20 border-emerald-500/30">
                                    <div className="text-[10px] text-emerald-400 mb-1">전신거울</div><div className={`text-xs font-bold ${hasExploredFov ? 'text-emerald-400' : 'text-slate-500'}`}>{hasExploredFov ? '정답 확인!' : '미완료'}</div>
                                </div>
                            </div>
                            
                            {/* 타임어택 점수 기록이 있으면 표시 */}
                            {(score > 0 || maxCombo > 0) && (
                                <div className="mt-4 p-3 bg-red-900/20 border border-red-500/30 rounded-xl flex justify-between items-center">
                                    <span className="font-bold text-red-400">🔥 타임어택 기록</span>
                                    <span className="text-white font-black text-lg">{score}점 (최대 {maxCombo}콤보)</span>
                                </div>
                            )}
                        </div>

                        <div className="glass p-6 rounded-2xl">
                            <h3 className="text-xl font-bold text-yellow-400 mb-4 border-b border-slate-700 pb-2">2. 개념 확인 OX 퀴즈</h3>
                            <div className="space-y-4">
                                {quizzes.map((quiz, idx) => (
                                    <div key={idx} className="glass-panel p-4 rounded-xl">
                                        <p className="font-bold text-white mb-3 text-sm">Q{idx + 1}. {quiz.q}</p>
                                        <div className="flex gap-4">
                                            <button onClick={() => handleQuizAnswer(idx, true)} className={`flex-1 py-2 rounded-lg font-bold border-2 transition-all btn-active text-sm ${quizAnswers[idx] === true ? 'bg-blue-600 border-blue-500 text-white' : 'border-slate-600 text-slate-400'}`}>O 맞음</button>
                                            <button onClick={() => handleQuizAnswer(idx, false)} className={`flex-1 py-2 rounded-lg font-bold border-2 transition-all btn-active text-sm ${quizAnswers[idx] === false ? 'bg-red-600 border-red-500 text-white' : 'border-slate-600 text-slate-400'}`}>X 틀림</button>
                                        </div>
                                        {quizAnswers[idx] !== null && (
                                            <div className={`mt-3 p-3 rounded-lg text-xs leading-relaxed ${quizAnswers[idx] === quiz.a ? 'bg-green-900/30 text-green-300' : 'bg-red-900/30 text-red-300'}`}>
                                                <strong>{quizAnswers[idx] === quiz.a ? '정답입니다!' : '오답입니다.'}</strong> {quiz.explain}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="glass p-6 rounded-2xl">
                            <h3 className="text-xl font-bold text-emerald-400 mb-4 border-b border-slate-700 pb-2">3. 학생 정보 및 제출</h3>
                            <div className="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label className="block text-sm font-bold text-slate-300 mb-2">학번</label>
                                    <input type="text" value={studentId} onChange={e=>setStudentId(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-xl p-3 text-white focus:outline-none focus:border-blue-500"/>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-slate-300 mb-2">이름</label>
                                    <input type="text" value={studentName} onChange={e=>setStudentName(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-xl p-3 text-white focus:outline-none focus:border-blue-500"/>
                                </div>
                            </div>
                            <div className="mb-6">
                                <label className="block text-sm font-bold text-slate-300 mb-2">다섯 가지 실험을 통해 새롭게 알게 된 점</label>
                                <textarea value={insight} onChange={e=>setInsight(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-xl p-3 text-white h-24 resize-none focus:outline-none focus:border-blue-500 text-sm leading-relaxed" placeholder="입사/반사각, 대칭성, 거울상의 특징(좌우가 아닌 앞뒤 반전), 다중 거울, 전신 거울의 원리 등 배운 내용을 자유롭게 적어주세요."></textarea>
                            </div>

                            <button onClick={submitData} disabled={isSubmitting} className="btn-active w-full py-4 bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-600 text-white rounded-xl font-bold text-lg flex justify-center items-center">
                                {isSubmitting ? "제출하는 중..." : "결과 제출하기 📤"}
                            </button>
                        </div>
                        <div className="text-center">
                            <button onClick={()=>navigate('simulation')} className="text-slate-400 underline hover:text-white text-sm">실험실로 돌아가기</button>
                        </div>
                    </div>
                </div>
            );

            const renderDone = () => (
                <div className="flex flex-col items-center justify-center min-h-[100dvh] p-6 text-center animate-fade-in pb-[max(env(safe-area-inset-bottom,24px),24px)]">
                    <div className="glass p-10 rounded-3xl shadow-2xl max-w-md w-full flex flex-col items-center border border-green-500/30">
                        <div className="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mb-6">
                            <span className="text-4xl">🎉</span>
                        </div>
                        <h2 className="text-3xl font-black mb-4 text-white">제출 완료!</h2>
                        <p className="text-slate-300 mb-8 leading-relaxed">
                            {studentName} 학생의 통합 실험 결과가<br/>성공적으로 기록되었습니다.<br/>
                            <span className="text-yellow-400 font-bold block mt-2">퀴즈 점수: {quizScore} / 3 점</span>
                        </p>
                        <button onClick={() => window.location.reload()} className="btn-active w-full py-4 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-bold transition-colors">
                            처음으로 돌아가기
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="relative min-h-[100dvh] flex flex-col">
                    <button onClick={() => setIsGuideOpen(true)} className="fixed top-[max(env(safe-area-inset-top,16px),16px)] right-[max(env(safe-area-inset-right,16px),16px)] z-40 bg-slate-800/80 hover:bg-slate-700 text-slate-300 border border-slate-600 px-3 py-1.5 rounded-full text-xs font-bold shadow-lg transition-colors">
                        ⚙️ DB 연동 가이드
                    </button>

                    <div className="flex-1 w-full max-w-7xl mx-auto">
                        {view === 'intro' && renderIntro()}
                        {view === 'simulation' && renderSimulation()}
                        {view === 'report' && renderReport()}
                        {view === 'done' && renderDone()}
                    </div>

                    <AlertModal isOpen={alertMsg !== ''} onClose={() => setAlertMsg('')} message={alertMsg} />

                    <Modal isOpen={isGuideOpen} onClose={() => setIsGuideOpen(false)} title="교사 관리자 가이드">
                        <div className="space-y-4 text-sm">
                            <div className="bg-slate-800 p-4 rounded-xl">
                                <h3 className="font-bold text-yellow-400 mb-2">① 구글 시트 준비</h3>
                                <p>새 구글 시트를 생성하고 1행에 아래 헤더를 입력하세요:</p>
                                <div className="relative mt-2">
                                    <code className="block bg-slate-900 p-3 pr-12 rounded text-blue-300 text-xs overflow-x-auto whitespace-nowrap">timestamp | studentId | studentName | minValue | maxValue | gameSuccess | reflectionSuccess | multiSuccess | fovSuccess | timeAttackScore | quizScore | insight</code>
                                    <button onClick={(e) => { 
                                        const text = e.target.previousSibling.innerText;
                                        const textArea = document.createElement("textarea");
                                        textArea.value = text;
                                        document.body.appendChild(textArea);
                                        textArea.select();
                                        try { document.execCommand('copy'); setAlertMsg("시트 헤더가 복사되었습니다!"); } catch (err) { setAlertMsg("복사 실패"); }
                                        document.body.removeChild(textArea);
                                    }} className="absolute top-1/2 -translate-y-1/2 right-2 bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded text-xs text-white btn-active">복사</button>
                                </div>
                            </div>
                            
                            <div className="bg-slate-800 p-4 rounded-xl">
                                <h3 className="font-bold text-yellow-400 mb-2">② Apps Script 코드 작성 (자동 헤더 포함)</h3>
                                <div className="relative mt-2">
                                    <pre className="bg-slate-900 p-3 rounded text-xs text-slate-300 overflow-x-auto leading-relaxed">
{`function doPost(e) {
  try {
    const sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
    
    // 시트가 비어있을 경우 자동으로 1행 헤더를 삽입합니다.
    if (sheet.getLastRow() === 0) {
      sheet.appendRow([
        "timestamp", "studentId", "studentName", "minValue", "maxValue", 
        "gameSuccess", "reflectionSuccess", "multiSuccess", "fovSuccess", 
        "timeAttackScore", "quizScore", "insight"
      ]);
    }
    
    const data = JSON.parse(e.postData.contents);
    sheet.appendRow([
      new Date(), data.studentId || "", data.studentName || "",
      data.minValue ?? "", data.maxValue ?? "",
      data.gameSuccess || "", data.reflectionSuccess || "", data.multiSuccess || "", data.fovSuccess || "",
      data.timeAttackScore || 0, data.quizScore ?? "", data.insight || ""
    ]);
    return ContentService.createTextOutput(JSON.stringify({result:"success"})).setMimeType(ContentService.MimeType.JSON);
  } catch (err) {
    return ContentService.createTextOutput(JSON.stringify({result:"error", message: err.message})).setMimeType(ContentService.MimeType.JSON);
  }
}`}
                                    </pre>
                                    <button onClick={(e) => { 
                                        const text = e.target.previousSibling.innerText;
                                        const textArea = document.createElement("textarea");
                                        textArea.value = text;
                                        document.body.appendChild(textArea);
                                        textArea.select();
                                        try { document.execCommand('copy'); setAlertMsg("앱스 스크립트 코드가 복사되었습니다!"); } catch (err) { setAlertMsg("복사 실패"); }
                                        document.body.removeChild(textArea);
                                    }} className="absolute top-2 right-2 bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded text-xs text-white btn-active">복사</button>
                                </div>
                            </div>
                            <div className="text-center text-slate-500 pt-4 border-t border-slate-700">Created by Yang DH</div>
                        </div>
                    </Modal>
                    
                    {view !== 'intro' && view !== 'done' && <div className="fixed bottom-[max(env(safe-area-inset-bottom,16px),16px)] left-0 right-0 text-center text-slate-600 text-[10px] font-medium pointer-events-none">Created by Yang DH</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
